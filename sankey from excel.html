<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Sankey Finanzfluss Diagramm</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: sans-serif;
    }
    #sankey_chart {
      background-color: #1e1e1e;
      border: 1px solid #444;
      margin-top: 20px;
      width: 100%;
      height: 680px;
    }
    .google-visualization-tooltip {
      background-color: #ffffff !important;
      color: #1e1e1e !important;
      font-size: 14px;
      border-radius: 5px;
      padding: 5px;
    }
    h2, p, label {
      color: #ffffff;
    }
    select {
      background-color: #1e1e1e;
      color: #ffffff;
      border: 1px solid #444;
      padding: 5px;
      font-size: 1rem;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h2>Sankey Finanzfluss Diagramm</h2>
  <p>Datei-Format: <code>Datum, Kategorie, Einkommen, Ausgaben, Zweck</code></p>
  <input type="file" accept=".csv,.xlsx" onchange="handleFileSelect(event)" />
  <div>
    <label for="yearSelect">Jahr wählen:</label>
    <select id="yearSelect" onchange="drawSankeyForSelectedYear()" disabled>
      <option>-- Lade Daten --</option>
    </select>
  </div>

  <div>
    <label for="monthFilter">Monate wählen:</label>
    <div id="monthFilter" style="display: inline-flex; flex-wrap: wrap; align-items: center; margin-top: 10px;"></div>
  </div>
  <p>
  <div>
    <label for="groupThreshold">Mindestanzahl für eigene Kategorie:</label>
    <input
      type="number"
      id="groupThreshold"
      value="5"
      min="1"
      max="12"
      onchange="drawSankeyForSelectedYear()"
      style="margin-left: 10px; width: 60px;"
    />
  </div>

  <div style="margin-top: 10px;">
    <label>
      Erweiterte Infos:
      <input type="checkbox" id="keepBrackets" onchange="drawSankeyForSelectedYear()" />
    </label>
  </div>

  <div id="sankey_chart"></div>

  <script>
    google.charts.load('current', { packages: ['sankey'] });

    let allRows = [];
    let ausgabeKategorien = [];

    function handleFileSelect(evt) {
      const file = evt.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      const isExcel = file.name.endsWith('.xlsx');

      if (isExcel) {
        reader.onload = function (e) {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const csv = XLSX.utils.sheet_to_csv(sheet);
          processCSV(csv);
        };
        reader.readAsArrayBuffer(file);
      } else {
        reader.onload = function (e) {
          processCSV(e.target.result);
        };
        reader.readAsText(file);
      }
    }

    function createMonthCheckboxes() {
      const monthNames = [
        'Jan', 'Feb', 'Mar', 'Apr', 'Mai', 'Jun',
        'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'
      ];

      const monthFilter = document.getElementById('monthFilter');
      monthFilter.innerHTML = ''; // Vorherige Inhalte entfernen

      monthNames.forEach((month, index) => {
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = `month${index + 1}`;
        checkbox.value = index + 1; // Monat von 1 bis 12
        checkbox.checked = true;
        checkbox.onchange = drawSankeyForSelectedYear; // Diagramm aktualisieren

        const label = document.createElement('label');
        label.htmlFor = checkbox.id;
        label.textContent = month;
        label.style.marginRight = '5px';

        const container = document.createElement('div');
        container.style.marginRight = '5px';
        container.appendChild(checkbox);
        container.appendChild(label);

        monthFilter.appendChild(container);
      });
    }

    function getSelectedMonths() {
      const checkboxes = document.querySelectorAll('#monthFilter input[type="checkbox"]');
      const selectedMonths = [];
      checkboxes.forEach(checkbox => {
        if (checkbox.checked) {
          selectedMonths.push(parseInt(checkbox.value));
        }
      });
      return selectedMonths;
    }

    function processCSV(csv) {
      const lines = csv.trim().split('\n');
      const firstLine = lines[0].toLowerCase();
      const hasHeader = firstLine.includes('datum') && firstLine.includes('kategorie');
      allRows = hasHeader ? lines.slice(1) : lines;

      // Dynamische Erkennung von Kategorien mit Ausgaben
      const kategorienSet = new Set();
      allRows.forEach(row => {
        const cols = row.split(',');
        if (cols.length < 5) return;
        const ausgaben = parseFloat(cols[3]) || 0;
        if (ausgaben > 0) {
          const kategorie = cols[1].trim();
          if (kategorie) kategorienSet.add(kategorie);
        }
      });
      ausgabeKategorien = Array.from(kategorienSet);

      // Jahre extrahieren
      const years = Array.from(new Set(
        allRows.map(row => {
          const datum = row.split(',')[0].trim();
          return new Date(datum).getFullYear();
        })
      )).sort();

      const yearSelect = document.getElementById('yearSelect');
      yearSelect.innerHTML = '';
      years.forEach(year => {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        yearSelect.appendChild(option);
      });

      yearSelect.disabled = false;
      createMonthCheckboxes();
      drawSankeyForSelectedYear();
    }

    function sanitizeZweck(zweck) {
      const keepBrackets = document.getElementById('keepBrackets')?.checked;
      return keepBrackets ? zweck : zweck.replace(/\s*\(.*?\)/g, '').trim();
    }

    function drawSankeyForSelectedYear() {
      const selectedYear = parseInt(document.getElementById('yearSelect').value);
      const selectedMonths = getSelectedMonths();
      if (!selectedYear || ausgabeKategorien.length === 0) {
        console.warn("Keine gültigen Daten vorhanden.");
        return;
      }

      const data = [['Quelle', 'Ziel', 'Wert', { role: 'tooltip', type: 'string' }]];
      const einnahmeZwecke = {};
      const kategorieSummen = {};
      const zweckStats = {};

      allRows.forEach(row => {
        const cols = row.split(',');
        if (cols.length < 5) return;
        const datum = new Date(cols[0].trim());
        const jahr = datum.getFullYear();
        const monat = datum.getMonth() + 1; // Monat von 0-11 zu 1-12

        if (jahr !== selectedYear || (selectedMonths.length > 0 && !selectedMonths.includes(monat))) {
          return;
        }

        const kategorie = cols[1].trim();
        const einkommen = parseFloat(cols[2]) || 0;
        const ausgaben = parseFloat(cols[3]) || 0;
        const rawZweck = cols[4].trim();
        const zweck = sanitizeZweck(rawZweck);

        if (einkommen > 0) {
          einnahmeZwecke[zweck] = (einnahmeZwecke[zweck] || 0) + einkommen;
        }

        if (ausgaben > 0 && ausgabeKategorien.includes(kategorie)) {
          const key = `${kategorie}|${zweck}`;
          if (!zweckStats[key]) zweckStats[key] = { count: 0, sum: 0 };
          zweckStats[key].count++;
          zweckStats[key].sum += ausgaben;

          kategorieSummen[kategorie] = (kategorieSummen[kategorie] || 0) + ausgaben;
        }
      });

      for (const zweck in einnahmeZwecke) {
        const betrag = einnahmeZwecke[zweck];
        const tooltip = `${zweck} -> Einkommen<br>Wert: ${betrag.toFixed(2)}€`;
        data.push([zweck, 'Einkommen', betrag, tooltip]);
      }

      for (const kategorie in kategorieSummen) {
        const betrag = kategorieSummen[kategorie];
        const tooltip = `Einkommen -> ${kategorie}<br>Wert: ${betrag.toFixed(2)}€`;
        data.push(['Einkommen', kategorie, betrag, tooltip]);
      }

      const groupedZwecke = {};
      for (const key in zweckStats) {
        const [kategorie, zweck] = key.split('|');
        const { count, sum } = zweckStats[key];
        const threshold = parseInt(document.getElementById('groupThreshold').value) || 6;

        if (!groupedZwecke[kategorie]) groupedZwecke[kategorie] = {};
        if (count >= threshold) {
          groupedZwecke[kategorie][zweck] = { sum, details: [zweck] };
        } else {
          const sonstige = `Sonstige ${kategorie}`;
          if (!groupedZwecke[kategorie][sonstige]) {
            groupedZwecke[kategorie][sonstige] = { sum: 0, details: [] };
          }
          groupedZwecke[kategorie][sonstige].sum += sum;
          groupedZwecke[kategorie][sonstige].details.push({ name: zweck, value: sum });
        }
      }

      for (const kategorie in groupedZwecke) {
        const zwecke = groupedZwecke[kategorie];
        for (const zweck in zwecke) {
          const { sum, details } = zwecke[zweck];
          const detailsText = Array.isArray(details)
            ? details
              .filter(d => d.name && typeof d.value === 'number')
              .map(d => `- ${d.name}: ${d.value.toFixed(2)}€`)
              .join('<br>')
            : '';

          const tooltip = detailsText
            ? `${kategorie} -> ${zweck} <br> Wert: ${sum.toFixed(2)}€ <br><br>Positionen:<br>${detailsText}`
            : `${kategorie} -> ${zweck} <br> Wert: ${sum.toFixed(2)}€`;

          data.push([kategorie, zweck, sum, tooltip]);
        }
      }

      google.charts.setOnLoadCallback(() => {
        const chartData = google.visualization.arrayToDataTable(data);
        const chart = new google.visualization.Sankey(document.getElementById('sankey_chart'));
        chart.draw(chartData, {
          tooltip: { isHtml: true },
          sankey: {
            node: { label: { fontSize: 14, color: '#ffffff' }, nodePadding: 20 },
            link: { colorMode: 'gradient', opacity: 0.8 }
          }
        });
      });
    }
  </script>
</body>
</html>
